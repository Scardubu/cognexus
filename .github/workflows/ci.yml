name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXUS_ENV: test
  NEXUS_MODEL_VALIDATION_MODE: off
  NEXUS_SESSION_BACKEND: sqlite
  NEXUS_COMPACTION_ENABLED: "false"
  NEXUS_OTEL_ENABLED: "false"
  TRACE_INCLUDE_SENSITIVE: "false"
  OPENAI_AGENTS_TRACE_INCLUDE_SENSITIVE_DATA: "false"

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints/runtime.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26,<27" -c constraints/runtime.txt
          python -m pip install -r requirements-dev.txt -c constraints/runtime.txt
          python -m pip check
      - name: Lint and formatting
        run: |
          ruff check .
          ruff format --check .
      - name: Strict typing
        run: mypy .
      - name: Repository and version integrity
        run: |
          python scripts/verify_version.py
          python scripts/verify_runtime_lock.py
          python scripts/generate_repository_inventory.py --check
          python scripts/validate_repository.py
          python scripts/verify_deployment.py
          python .agents/skills/api-contract-governance-architect/scripts/validate_contract_policy.py
          python .agents/skills/edge-cache-architecture-architect/scripts/validate_cache_policy.py
          python .agents/skills/release-incident-operations-architect/scripts/validate_release_policy.py
          python -m skill_runtime.cli validate

  tests:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    env:
      NEXUS_SQLITE_PATH: /tmp/nexus-ci-${{ matrix.python-version }}.db
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints/runtime.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26,<27" -c constraints/runtime.txt
          python -m pip install -r requirements-dev.txt -c constraints/runtime.txt
          python -m pip check
      - name: Tests with branch coverage
        run: |
          mkdir -p artifacts
          pytest --cov --cov-report=term-missing --cov-report=xml:artifacts/coverage.xml
      - name: Offline smoke test
        run: python scripts/test_nexus.py --dry-run
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: artifacts/coverage.xml
          if-no-files-found: error
          retention-days: 14

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints/runtime.txt
      - name: Install auditor
        run: python -m pip install -r requirements-dev.txt -c constraints/runtime.txt
      - name: Audit runtime dependencies
        run: pip-audit -r constraints/runtime.txt

  build:
    name: Build and install distributions
    needs: [static-analysis, tests, dependency-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints/runtime.txt
      - name: Build wheel, source archive, and skills
        run: |
          python -m pip install --upgrade "pip>=26,<27" -c constraints/runtime.txt
          python -m pip install "build>=1.3,<2" "setuptools>=80,<81" "wheel>=0.45,<1" -c constraints/runtime.txt
          python scripts/verify_version.py
          python scripts/build_distribution.py --no-isolation
          python scripts/verify_distribution.py
          python -m venv /tmp/cognexus-runtime-sbom
          /tmp/cognexus-runtime-sbom/bin/python -m pip install --upgrade "pip>=26,<27" \
            -c constraints/runtime.txt
          /tmp/cognexus-runtime-sbom/bin/python -m pip install \
            -r requirements.txt \
            -c constraints/runtime.txt
          /tmp/cognexus-runtime-sbom/bin/python -m pip check
          /tmp/cognexus-runtime-sbom/bin/python -m skill_runtime.cli package \
            --output dist/skills
          /tmp/cognexus-runtime-sbom/bin/python scripts/generate_sbom.py \
            --output dist/cognexus-runtime.cdx.json
          python scripts/verify_runtime_lock.py \
            --sbom dist/cognexus-runtime.cdx.json \
            --require-sbom
          python scripts/create_checksums.py
          python scripts/create_release_manifest.py
          python scripts/verify_release.py \
            --dist dist \
            --sbom dist/cognexus-runtime.cdx.json \
            --require-sbom
      - name: Verify wheel in an isolated environment
        run: |
          python -m venv /tmp/cognexus-wheel-check
          /tmp/cognexus-wheel-check/bin/python -m pip install \
            -c "${{ github.workspace }}/constraints/runtime.txt" \
            dist/*.whl
          (
            cd /tmp
            /tmp/cognexus-wheel-check/bin/python -m pip check
            /tmp/cognexus-wheel-check/bin/python -c "from pathlib import Path; from server.app import create_app; import server.app; assert not Path(server.app.__file__).is_relative_to(Path('${{ github.workspace }}')); print(create_app().title)"
            /tmp/cognexus-wheel-check/bin/cognexus-server --version
            /tmp/cognexus-wheel-check/bin/cognexus-skills validate
          )
      - uses: actions/upload-artifact@v7
        with:
          name: cognexus-distributions-${{ github.sha }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/RELEASE_MANIFEST.json
            dist/cognexus-runtime.cdx.json
            dist/skills/
          if-no-files-found: error
          retention-days: 14
