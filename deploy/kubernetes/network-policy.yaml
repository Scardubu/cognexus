apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cognexus
  namespace: cognexus
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cognexus
      app.kubernetes.io/component: api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              cognexus-ingress: "true"
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6380
        - protocol: TCP
          port: 4317
