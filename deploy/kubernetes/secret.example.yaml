# Example only. Prefer External Secrets, Sealed Secrets, or your platform secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: cognexus-secrets
  namespace: cognexus
type: Opaque
stringData:
  OPENAI_API_KEY: replace-me
  NEXUS_API_KEY: replace-with-at-least-32-random-characters
  REDIS_URL: rediss://username:password@redis.example.internal:6380/0
  NEXUS_CORS_ORIGINS: https://app.example.com
  NEXUS_TRUSTED_HOSTS: api.example.com
  OTEL_EXPORTER_OTLP_ENDPOINT: https://otel.example.internal:4317
