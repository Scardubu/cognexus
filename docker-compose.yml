services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: 3.3.1
    image: nexus-openai:3.3.1
    init: true
    env_file:
      - .env
    environment:
      NEXUS_ENV: ${NEXUS_ENV:-development}
      NEXUS_HOST: 0.0.0.0
      NEXUS_PORT: "8000"
      NEXUS_WORKERS: "1"
      NEXUS_FORWARDED_ALLOW_IPS: ${NEXUS_FORWARDED_ALLOW_IPS:-127.0.0.1}
      NEXUS_SESSION_BACKEND: ${NEXUS_SESSION_BACKEND:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEXUS_SQLITE_PATH: /app/data/nexus_sessions.db
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      TRACE_INCLUDE_SENSITIVE: "false"
      OPENAI_AGENTS_TRACE_INCLUDE_SENSITIVE_DATA: "false"
    ports:
      - "${COGNEXUS_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - nexus_data:/app/data
    tmpfs:
      - /tmp:size=128m,mode=1777
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - edge
      - backend
    restart: unless-stopped
    stop_grace_period: 30s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: 2.0
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    user: "999:999"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 384mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.129.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - backend
    profiles: ["observability"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  edge:
  backend:
    internal: true

volumes:
  nexus_data:
  redis_data:
